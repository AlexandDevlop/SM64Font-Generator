<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SM64 Font Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stars"></div>

  <h1 class="main-title">SM64 Font<br>Generator!</h1>

  <div class="generator-box">
    <!-- Preview Area -->
    <div class="section-label">Message</div>
    <textarea id="textInput" placeholder="Type something!" rows="3"></textarea>

    <div id="previewArea">
      <span id="previewText">Type something!</span>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button id="downloadBtn" class="action-btn" title="Download as PNG">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v13M12 16l-5-5M12 16l5-5"/><path d="M4 20h16"/></svg>
      </button>
      <button id="copyBtn" class="action-btn" title="Copy to clipboard">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>
      </button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="font">Font</button>
      <button class="tab" data-tab="color">Color</button>
      <button class="tab" data-tab="settings">Settings</button>
    </div>

    <!-- Font Tab -->
    <div class="tab-content active" id="tab-font">
      <div class="font-grid">
        <button class="font-btn active" data-font="Mario64" style="font-family: 'Mario64';">Mario64</button>
        <button class="font-btn" data-font="SuperMario64Font" style="font-family: 'SuperMario64Font';">SM64 HUD</button>
        <button class="font-btn" data-font="SM64Text" style="font-family: 'SM64Text';">SM64 Text</button>
        <button class="font-btn" data-font="SuperMario286" style="font-family: 'SuperMario286';">Super Mario 286</button>
        <button class="font-btn" data-font="TypefaceMario64" style="font-family: 'TypefaceMario64';">Typeface Mario 64</button>
      </div>
      <div class="selected-font">Selected font: <span id="currentFontName">Mario64</span></div>
    </div>

    <!-- Color Tab -->
    <div class="tab-content" id="tab-color">
      <div class="section-label">Select Color</div>
      <div class="color-input-row">
        <input type="color" id="colorPicker" value="#FFFFFF">
        <input type="text" id="colorHex" value="FFFFFF" maxlength="6" class="hex-input">
      </div>
      <div class="color-presets">
        <button class="color-swatch" data-color="#FFFFFF" style="background:#FFFFFF;" title="White"></button>
        <button class="color-swatch" data-color="#FF0000" style="background:#FF0000;" title="Red"></button>
        <button class="color-swatch" data-color="#FF6600" style="background:#FF6600;" title="Orange"></button>
        <button class="color-swatch" data-color="#FFDD00" style="background:#FFDD00;" title="Yellow"></button>
        <button class="color-swatch" data-color="#00CC00" style="background:#00CC00;" title="Green"></button>
        <button class="color-swatch" data-color="#00CCFF" style="background:#00CCFF;" title="Cyan"></button>
        <button class="color-swatch" data-color="#0066FF" style="background:#0066FF;" title="Blue"></button>
        <button class="color-swatch" data-color="#9933FF" style="background:#9933FF;" title="Purple"></button>
        <button class="color-swatch" data-color="#FF33CC" style="background:#FF33CC;" title="Pink"></button>
        <button class="color-swatch" data-color="#000000" style="background:#000000; border: 1px solid #555;" title="Black"></button>
      </div>

      <div class="section-label" style="margin-top: 16px;">Stroke / Border</div>
      <div class="stroke-controls">
        <label class="toggle-label">
          <input type="checkbox" id="strokeEnabled">
          <span>Enable stroke</span>
        </label>
        <div class="stroke-options" id="strokeOptions">
          <div class="control-row">
            <label>Color:</label>
            <input type="color" id="strokeColor" value="#000000">
          </div>
          <div class="control-row">
            <label>Width:</label>
            <input type="range" id="strokeWidth" min="1" max="10" value="3">
            <span id="strokeWidthVal">3px</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Settings Tab -->
    <div class="tab-content" id="tab-settings">
      <div class="section-label">Extra Settings</div>

      <div class="settings-grid">
        <div class="setting-item">
          <label>Align</label>
          <div class="align-buttons">
            <button class="align-btn" data-align="left" title="Left">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M3 12h12M3 18h16"/></svg>
            </button>
            <button class="align-btn active" data-align="center" title="Center">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M6 12h12M4 18h16"/></svg>
            </button>
            <button class="align-btn" data-align="right" title="Right">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M9 12h12M5 18h16"/></svg>
            </button>
          </div>
        </div>

        <div class="setting-item">
          <label>Font Size (px)</label>
          <input type="number" id="fontSize" value="72" min="8" max="300" class="setting-input">
        </div>

        <div class="setting-item">
          <label>Letter Spacing (px)</label>
          <input type="number" id="letterSpacing" value="0" min="-20" max="50" class="setting-input">
        </div>

        <div class="setting-item">
          <label>Line Height</label>
          <input type="number" id="lineHeight" value="1.2" min="0.5" max="3" step="0.1" class="setting-input">
        </div>

        <div class="setting-item">
          <label>Max Width (px)</label>
          <input type="number" id="maxWidth" value="800" min="100" max="3000" class="setting-input">
        </div>

        <div class="setting-item">
          <label>Background</label>
          <div class="bg-controls">
            <label class="toggle-label">
              <input type="checkbox" id="bgTransparent" checked>
              <span>Transparent</span>
            </label>
            <div class="bg-color-row" id="bgColorRow" style="display:none;">
              <input type="color" id="bgColor" value="#0000AA">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>SM64 Font Generator &mdash; Super Mario 64 is owned by Nintendo</p>
  </footer>

  <!-- Hidden canvas for PNG export -->
  <canvas id="exportCanvas" style="display:none;"></canvas>

  <script src="script.js"></script>
</body>
</html>
