<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM64 Font Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1 class="title">SM64 Font Generator</h1>
            <p class="subtitle">Genera texto con la fuente de Super Mario 64</p>
        </header>
 
        <main class="main-content">
            <!-- Controls Panel -->
            <section class="controls-panel">
                <!-- Text Input -->
                <div class="control-group">
                    <label for="text-input" class="control-label">Mensaje</label>
                    <textarea id="text-input" class="text-input" placeholder="Escribe tu texto aqui..." rows="3">HELLO WORLD</textarea>
                </div>
 
                <!-- Font Selection -->
                <div class="control-group">
                    <label for="font-selector" class="control-label">Fuente</label>
                    <select id="font-selector" class="font-select">
                        <!-- Font options will be generated by JS -->
                    </select>
                </div>
 
                <!-- Size Control -->
                <div class="control-group">
                    <label for="size-slider" class="control-label">Tamano: <span id="size-value">64</span>px</label>
                    <input type="range" id="size-slider" class="slider" min="16" max="256" value="64">
                </div>
 
                <!-- Spacing Control -->
                <div class="control-group">
                    <label for="spacing-slider" class="control-label">Espaciado: <span id="spacing-value">2</span>px</label>
                    <input type="range" id="spacing-slider" class="slider" min="-10" max="30" value="2">
                </div>
 
                <!-- Line Height Control -->
                <div class="control-group">
                    <label for="line-height-slider" class="control-label">Altura de linea: <span id="line-height-value">1.5</span>x</label>
                    <input type="range" id="line-height-slider" class="slider" min="10" max="40" value="15" step="1">
                </div>
 
                <!-- Background Color -->
                <div class="control-group">
                    <label class="control-label">Fondo</label>
                    <div class="bg-options">
                        <button class="bg-btn active" data-bg="transparent" title="Transparente">
                            <span class="transparent-pattern"></span>
                        </button>
                        <button class="bg-btn" data-bg="#000000" title="Negro">
                            <span style="background:#000000;width:100%;height:100%;display:block;border-radius:4px;"></span>
                        </button>
                        <button class="bg-btn" data-bg="#1a1a2e" title="Azul Oscuro">
                            <span style="background:#1a1a2e;width:100%;height:100%;display:block;border-radius:4px;"></span>
                        </button>
                        <button class="bg-btn" data-bg="#ffffff" title="Blanco">
                            <span style="background:#ffffff;width:100%;height:100%;display:block;border-radius:4px;border:1px solid #333;"></span>
                        </button>
                        <button class="bg-btn" data-bg="#2d5a27" title="Verde Mario">
                            <span style="background:#2d5a27;width:100%;height:100%;display:block;border-radius:4px;"></span>
                        </button>
                        <button class="bg-btn" data-bg="custom" title="Color personalizado">
                            <input type="color" id="custom-bg-color" value="#ff0000" class="color-picker-mini">
                        </button>
                    </div>
                </div>
 
                <!-- Alignment -->
                <div class="control-group">
                    <label class="control-label">Alineacion</label>
                    <div class="align-options">
                        <button class="align-btn active" data-align="left" title="Izquierda">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h18v2H3zm0 4h12v2H3zm0 4h18v2H3zm0 4h12v2H3zm0 4h18v2H3z"/></svg>
                        </button>
                        <button class="align-btn" data-align="center" title="Centro">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h18v2H3zm3 4h12v2H6zm-3 4h18v2H3zm3 4h12v2H6zm-3 4h18v2H3z"/></svg>
                        </button>
                        <button class="align-btn" data-align="right" title="Derecha">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h18v2H3zm6 4h12v2H9zm-6 4h18v2H3zm6 4h12v2H9zm-6 4h18v2H3z"/></svg>
                        </button>
                    </div>
                </div>
 
                <!-- Download Button -->
                <div class="control-group">
                    <button id="download-btn" class="download-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                        Descargar PNG
                    </button>
                </div>
            </section>
 
            <!-- Preview Area -->
            <section class="preview-section">
                <div class="preview-header">
                    <span class="preview-label">Vista Previa</span>
                </div>
                <div id="preview-container" class="preview-container">
                    <canvas id="preview-canvas"></canvas>
                </div>
            </section>
 
            <!-- Character Map -->
            <section class="charmap-section">
                <div class="charmap-header">
                    <span class="charmap-label">Mapa de Caracteres</span>
                    <span id="char-count" class="char-count"></span>
                </div>
                <div id="charmap" class="charmap">
                    <!-- Characters will be populated by JS -->
                </div>
            </section>
        </main>
 
        <footer class="footer">
            <p>SM64 Font Generator &mdash; Los sprites/assets pertenecen a Nintendo</p>
        </footer>
    </div>
 
    <script src="script.js"></script>
</body>
</html>
